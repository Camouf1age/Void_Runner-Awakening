name: Build and Deploy to Proisp

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
      - run: npm run build

      - name: Upload to Proisp via SFTP
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASS: ${{ secrets.SFTP_PASS }}
        run: |
          sudo apt-get install -y lftp
          lftp -u "$SFTP_USER,$SFTP_PASS" -e "
            set sftp:auto-confirm yes;
            set net:timeout 30;
            mirror -R --delete --no-perms ./dist/ /customers/1/4/4/c3gpmol7q/webroots/r1458810/;
            bye
          " sftp://$SFTP_HOST
