name: Build and Deploy to Proisp

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
      - run: npm run build

      - name: Upload to Proisp
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          python3 << 'PYEOF'
          import ftplib, os
          from pathlib import Path

          host     = os.environ['FTP_HOST']
          user     = os.environ['FTP_USER']
          password = os.environ['FTP_PASS']
          remote   = '/games'

          ftp = ftplib.FTP(host, user, password, timeout=30)
          ftp.encoding = 'utf-8'
          print(f'Connected: {ftp.getwelcome()}')

          def mkdir_p(path):
              parts = [p for p in path.split('/') if p]
              cur = ''
              for p in parts:
                  cur += '/' + p
                  try: ftp.mkd(cur)
                  except: pass

          def upload(local, rem):
              for item in sorted(Path(local).iterdir()):
                  rp = rem + '/' + item.name
                  if item.is_dir():
                      mkdir_p(rp)
                      upload(item, rp)
                  else:
                      print(f'  {item.name}')
                      with open(item, 'rb') as f:
                          ftp.storbinary(f'STOR {rp}', f)

          mkdir_p(remote)
          print(f'Uploading dist/ -> {remote}')
          upload('dist', remote)
          ftp.quit()
          print('Done.')
          PYEOF
